version: '3.9'

# ═════════════════════════════════════════════════════════════
# IMPERIUM 7™ — PRODUCTION DOCKER COMPOSE STACK
# Multi-tier, scalable, resilient architecture
# ═════════════════════════════════════════════════════════════

networks:
  traefik-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  internal-net:
    driver: bridge
    internal: true
  agent-net:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  traefik-certs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  jaeger-data:
    driver: local

services:

  # ═════════════════════════════════════════════════════════════
  # LAYER 1: REVERSE PROXY & LOAD BALANCING
  # ═════════════════════════════════════════════════════════════

  traefik:
    image: traefik:v3.0
    container_name: imperium-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik-net
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'  # Dashboard (internal only)
    environment:
      - TRAEFIK_API=true
      - TRAEFIK_API_INSECURE=false
      - TRAEFIK_API_DASHBOARD=true
      - TRAEFIK_LOG_LEVEL=INFO
      - TRAEFIK_ENTRYPOINTS_WEB_ADDRESS=:80
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS=:443
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_CASERVER=https://acme-v02.api.letsencrypt.org/directory
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE=/etc/traefik/acme/acme.json
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE_ENTRYPOINT=web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/etc/traefik/acme
      - ./traefik/traefik.prod.yml:/traefik.yml:ro
      - ./traefik/dynamic-config.yml:/dynamic-config.yml:ro
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.traefik.rule=Host(`${DOMAIN}`)||Host(`${API_DOMAIN}`)'
      - 'traefik.http.routers.traefik.entrypoints=websecure'
      - 'traefik.http.routers.traefik.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.traefik.service=api@internal'
      - 'traefik.http.services.traefik.loadbalancer.server.port=8080'

  # ═════════════════════════════════════════════════════════════
  # LAYER 2: DATA PERSISTENCE (DATABASES & CACHING)
  # ═════════════════════════════════════════════════════════════

  imperium-mongodb:
    image: mongo:6.0-alpine
    container_name: imperium-mongodb
    restart: unless-stopped
    networks:
      - internal-net
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE}
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
    volumes:
      - mongodb-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: --replSet rs0 --wiredTigerCacheSizeGB 2
    healthcheck:
      test: echo 'db.runCommand("ping").ok" | mongosh localhost:27017/test --quiet'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  imperium-redis:
    image: redis:7.2-alpine
    container_name: imperium-redis
    restart: unless-stopped
    networks:
      - internal-net
    command:
      - redis-server
      - '--requirepass'
      - '${REDIS_PASSWORD}'
      - '--maxmemory'
      - '2gb'
      - '--maxmemory-policy'
      - 'allkeys-lru'
      - '--appendonly'
      - 'yes'
      - '--appendfsync'
      - 'everysec'
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  imperium-postgres:
    image: postgres:16-alpine
    container_name: imperium-postgres
    restart: unless-stopped
    networks:
      - internal-net
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER}
      interval: 10s
      timeout: 5s
      retries: 5

  # ═════════════════════════════════════════════════════════════
  # LAYER 3: BACKEND SERVICES & AGENTS
  # ═════════════════════════════════════════════════════════════

  imperium-backend:
    build:
      context: ./imperium-backend
      dockerfile: Dockerfile
    container_name: imperium-backend
    restart: unless-stopped
    networks:
      - traefik-net
      - internal-net
      - agent-net
    depends_on:
      imperium-mongodb:
        condition: service_healthy
      imperium-redis:
        condition: service_healthy
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=4000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HERMES_AGENT_URL=http://hermes-agent:8001
      - FOA1_ENABLED=${FOA1_ENABLED}
      - SOA1_ENABLED=${SOA1_ENABLED}
      - TSA1_ENABLED=${TSA1_ENABLED}
      - SFA1_ENABLED=${SFA1_ENABLED}
      - OPA1_ENABLED=${OPA1_ENABLED}
      - OMA1_ENABLED=${OMA1_ENABLED}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)||PathPrefix(`/api`)'
      - 'traefik.http.routers.api.entrypoints=websecure'
      - 'traefik.http.routers.api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.api.loadbalancer.server.port=4000'
      - 'traefik.http.services.api.loadbalancer.healthcheck.path=/api/health'
      - 'traefik.http.services.api.loadbalancer.healthcheck.interval=30s'
    healthcheck:
      test: curl -f http://localhost:4000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  hermes-agent:
    build:
      context: ./ml-tools
      dockerfile: Dockerfile
    container_name: imperium-hermes-agent
    restart: unless-stopped
    networks:
      - internal-net
      - agent-net
    depends_on:
      - imperium-redis
    environment:
      - PYTHON_ENV=production
      - PORT=8001
      - WORKERS=${HERMES_AGENT_WORKERS}
      - TIMEOUT=${HERMES_AGENT_TIMEOUT}
      - REDIS_URL=${REDIS_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL=${HERMES_MODEL}
      - MAX_TOKENS=${HERMES_MAX_TOKENS}
      - TEMPERATURE=${HERMES_TEMPERATURE}
      - LOG_LEVEL=${HERMES_AGENT_LOG_LEVEL}
      - FAILOVER_ENABLED=${HERMES_AGENT_FAILOVER}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.hermes.rule=Host(`${ML_DOMAIN}`)||PathPrefix(`/ml`)'
      - 'traefik.http.routers.hermes.entrypoints=websecure'
      - 'traefik.http.routers.hermes.tls.certresolver=letsencrypt'
      - 'traefik.http.services.hermes.loadbalancer.server.port=8001'
    healthcheck:
      test: curl -f http://localhost:8001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # ═════════════════════════════════════════════════════════════
  # LAYER 4: FRONTEND & USER INTERFACES
  # ═════════════════════════════════════════════════════════════

  imperium-hub-app:
    build:
      context: ./imperium-hub-app
      dockerfile: Dockerfile
    container_name: imperium-hub-app
    restart: unless-stopped
    networks:
      - traefik-net
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=https://${API_DOMAIN}
      - NEXT_PUBLIC_WS_URL=wss://${API_DOMAIN}/ws
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.hub.rule=Host(`${DOMAIN}`)||Host(`${WWW_DOMAIN}`)||Host(`${DASHBOARD_DOMAIN}`)'
      - 'traefik.http.routers.hub.entrypoints=websecure'
      - 'traefik.http.routers.hub.tls.certresolver=letsencrypt'
      - 'traefik.http.services.hub.loadbalancer.server.port=3000'
    healthcheck:
      test: curl -f http://localhost:3000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  hermes-workspace:
    build:
      context: ./hermes-workspace
      dockerfile: Dockerfile
    container_name: imperium-hermes-workspace
    restart: unless-stopped
    networks:
      - traefik-net
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=https://${API_DOMAIN}
      - NEXT_PUBLIC_WORKSPACE_URL=https://${WORKSPACE_DOMAIN}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.workspace.rule=Host(`${WORKSPACE_DOMAIN}`)'
      - 'traefik.http.routers.workspace.entrypoints=websecure'
      - 'traefik.http.routers.workspace.tls.certresolver=letsencrypt'
      - 'traefik.http.services.workspace.loadbalancer.server.port=3000'
    healthcheck:
      test: curl -f http://localhost:3000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  react-playground:
    build:
      context: ./react-playground
      dockerfile: Dockerfile
    container_name: imperium-react-playground
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.playground.rule=PathPrefix(`/playground`)'
      - 'traefik.http.routers.playground.entrypoints=websecure'
      - 'traefik.http.routers.playground.tls.certresolver=letsencrypt'
      - 'traefik.http.services.playground.loadbalancer.server.port=3000'

  # ═════════════════════════════════════════════════════════════
  # LAYER 5: MONITORING & OBSERVABILITY
  # ═════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: imperium-prometheus
    restart: unless-stopped
    networks:
      - internal-net
      - traefik-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.prometheus.rule=Host(`${DOMAIN}`)&&PathPrefix(`/prometheus`)'
      - 'traefik.http.routers.prometheus.entrypoints=websecure'
      - 'traefik.http.routers.prometheus.tls.certresolver=letsencrypt'
      - 'traefik.http.services.prometheus.loadbalancer.server.port=9090'

  grafana:
    image: grafana/grafana:latest
    container_name: imperium-grafana
    restart: unless-stopped
    networks:
      - internal-net
      - traefik-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`${DOMAIN}`)&&PathPrefix(`/grafana`)'
      - 'traefik.http.routers.grafana.entrypoints=websecure'
      - 'traefik.http.routers.grafana.tls.certresolver=letsencrypt'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: imperium-jaeger
    restart: unless-stopped
    networks:
      - internal-net
      - traefik-net
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    ports:
      - '6831:6831/udp'
    volumes:
      - jaeger-data:/badger
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.jaeger.rule=Host(`${DOMAIN}`)&&PathPrefix(`/jaeger`)'
      - 'traefik.http.routers.jaeger.entrypoints=websecure'
      - 'traefik.http.routers.jaeger.tls.certresolver=letsencrypt'
      - 'traefik.http.services.jaeger.loadbalancer.server.port=16686'


