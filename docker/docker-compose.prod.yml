version: '3.9'

networks:
  traefik-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  internal-net:
    driver: bridge
    internal: true
  agent-net:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
  postgres-data:
  traefik-certs:
  prometheus-data:
  grafana-data:
  jaeger-data:

services:

  traefik:
    image: traefik:v3.0
    container_name: imperium-traefik
    restart: unless-stopped
    networks:
      - traefik-net
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/etc/traefik/acme
      - ./traefik/traefik.prod.yml:/traefik.yml:ro
      - ./traefik/dynamic-config.yml:/dynamic-config.yml:ro

  imperium-mongodb:
    image: mongo:6.0-alpine
    container_name: imperium-mongodb
    restart: unless-stopped
    networks:
      - internal-net
    volumes:
      - mongodb-data:/data/db

  imperium-redis:
    image: redis:7.2-alpine
    container_name: imperium-redis
    restart: unless-stopped
    networks:
      - internal-net
    volumes:
      - redis-data:/data

  imperium-postgres:
    image: postgres:16-alpine
    container_name: imperium-postgres
    restart: unless-stopped
    networks:
      - internal-net
    volumes:
      - postgres-data:/var/lib/postgresql/data

  imperium-backend:
    build:
      context: ./imperium-backend
    container_name: imperium-backend
    restart: unless-stopped
    networks:
      - traefik-net
      - internal-net
      - agent-net
    environment:
      - PORT=4000
      - HERMES_AGENT_URL=http://hermes-agent:8001

  hermes-agent:
    build:
      context: ./ml-tools
    container_name: hermes-agent
    restart: unless-stopped
    networks:
      - internal-net
      - agent-net
    environment:
      - PORT=8001
    expose:
      - "8001"

  imperium-hub-app:
    build:
      context: ./imperium-hub-app
    container_name: imperium-hub-app
    restart: unless-stopped
    networks:
      - traefik-net

  hermes-workspace:
    build:
      context: ./hermes-workspace
    container_name: hermes-workspace
    restart: unless-stopped
    networks:
      - traefik-net

  react-playground:
    build:
      context: ./react-playground
    container_name: react-playground
    restart: unless-stopped
    networks:
      - traefik-net



