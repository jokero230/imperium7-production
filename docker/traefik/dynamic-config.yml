traefik/dynamic-config.yml
# ═════════════════════════════════════════════════════════════
# IMPERIUM 7™ — DYNAMIC ROUTING CONFIGURATION
# Dynamic Traefik configuration for microservices routing
# ═════════════════════════════════════════════════════════════

http:
  middlewares:
    # ─── SECURITY HEADERS ────────────────────────────────────
    securityHeaders:
      headers:
        accessControlAllowCredentials: true
        accessControlAllowHeaders: Content-Type,Authorization,X-API-Key
        accessControlAllowMethods: GET,POST,PUT,DELETE,OPTIONS,PATCH
        accessControlAllowOriginList:
          - https://deputatai.com
          - https://*.deputatai.com
        accessControlMaxAge: 3600
        customRequestHeaders:
          X-Client-Version: '1.0.0'
          X-Service-Name: 'imperium-7'
        customResponseHeaders:
          X-Frame-Options: SAMEORIGIN
          X-Content-Type-Options: nosniff
          X-XSS-Protection: '1; mode=block'
          Referrer-Policy: strict-origin-when-cross-origin
          Permissions-Policy: 'geolocation=(), microphone=(), camera=()'
          Strict-Transport-Security: 'max-age=31536000; includeSubDomains; preload'
        forceSTSHeader: true

    # ─── COMPRESSION ──────────────────────────────────────
    compress:
      compress:
        minResponseBodyBytes: 1024
        excludedContentTypes:
          - text/event-stream
          - application/octet-stream

    # ─── RATE LIMITING ────────────────────────────────────
    rateLimit:
      rateLimit:
        average: 100
        period: 60
        burst: 200

    rateLimit-api:
      rateLimit:
        average: 50
        period: 60
        burst: 100

    rateLimit-ml:
      rateLimit:
        average: 10
        period: 60
        burst: 20

    # ─── REQUEST TIMEOUT ──────────────────────────────────
    timeout:
      forwardauth:
        address: http://imperium-backend:4000/auth/verify
        trustForwardHeader: true
        authResponseHeadersRegex: ^X-|

    # ─── CORS ─────────────────────────────────────────────
    cors:
      headers:
        accessControlAllowCredentials: true
        accessControlAllowHeaders: '*'
        accessControlAllowMethods: GET,POST,PUT,DELETE,OPTIONS,PATCH
        accessControlAllowOriginList:
          - https://deputatai.com
          - https://*.deputatai.com
        accessControlExposeHeaders: '*'
        accessControlMaxAge: 3600

    # ─── STRIP PREFIX ─────────────────────────────────────
    stripPrefix:
      stripPrefix:
        prefixes:
          - /api
          - /ml
          - /v1
        forceSlash: false

    # ─── REDIRECT HTTPS ───────────────────────────────────
    redirectHttps:
      redirectScheme:
        scheme: https
        permanent: true

    # ─── WWW REDIRECT ─────────────────────────────────────
    redirectWWW:
      redirectRegex:
        regex: ^https://www\.(.*)$
        replacement: https://$1
        permanent: true

  routers:
    # ─── MAIN DASHBOARD (www → non-www) ───────────────────
    hub-www:
      entryPoints:
        - web
        - websecure
      rule: Host(`www.deputatai.com`)
      middlewares:
        - redirectWWW
      service: hub
      tls:
        certResolver: letsencrypt

    hub-main:
      entryPoints:
        - web
        - websecure
      rule: Host(`deputatai.com`)||Host(`dashboard.deputatai.com`)
      middlewares:
        - securityHeaders
        - compress
        - rateLimit
      service: hub
      tls:
        certResolver: letsencrypt

    # ─── API ROUTES ───────────────────────────────────────
    api:
      entryPoints:
        - web
        - websecure
      rule: Host(`api.deputatai.com`)||PathPrefix(`/api`)
      middlewares:
        - securityHeaders
        - compress
        - rateLimit-api
      service: imperium-backend
      tls:
        certResolver: letsencrypt

    # ─── ML / HERMES AGENT ROUTES ─────────────────────────
    ml:
      entryPoints:
        - web
        - websecure
      rule: Host(`ml.deputatai.com`)||PathPrefix(`/ml`)
      middlewares:
        - securityHeaders
        - compress
        - rateLimit-ml
      service: hermes-agent
      tls:
        certResolver: letsencrypt

    # ─── WORKSPACE ROUTES ─────────────────────────────────
    workspace:
      entryPoints:
        - web
        - websecure
      rule: Host(`workspace.deputatai.com`)
      middlewares:
        - securityHeaders
        - compress
        - rateLimit
      service: hermes-workspace
      tls:
        certResolver: letsencrypt

    # ─── PLAYGROUND ROUTES ────────────────────────────────
    playground:
      entryPoints:
        - web
        - websecure
      rule: PathPrefix(`/playground`)
      middlewares:
        - securityHeaders
        - compress
      service: react-playground
      tls:
        certResolver: letsencrypt

    # ─── MONITORING & OBSERVABILITY ───────────────────────
    prometheus:
      entryPoints:
        - websecure
      rule: Host(`deputatai.com`)&&PathPrefix(`/prometheus`)
      middlewares:
        - securityHeaders
      service: prometheus
      tls:
        certResolver: letsencrypt

    grafana:
      entryPoints:
        - websecure
      rule: Host(`deputatai.com`)&&PathPrefix(`/grafana`)
      middlewares:
        - securityHeaders
      service: grafana
      tls:
        certResolver: letsencrypt

    jaeger:
      entryPoints:
        - websecure
      rule: Host(`deputatai.com`)&&PathPrefix(`/jaeger`)
      middlewares:
        - securityHeaders
      service: jaeger
      tls:
        certResolver: letsencrypt

  services:
    # ─── HUB SERVICE ──────────────────────────────────────
    hub:
      loadBalancer:
        servers:
          - url: http://imperium-hub-app:3000
        healthCheck:
          path: /
          interval: 30s
          timeout: 5s
        sticky:
          cookie:
            name: SERVERID
            secure: true
            httpOnly: true
            sameSite: Strict

    # ─── API SERVICE ──────────────────────────────────────
    imperium-backend:
      loadBalancer:
        servers:
          - url: http://imperium-backend:4000
        healthCheck:
          path: /api/health
          interval: 30s
          timeout: 10s
        passHostHeader: true
        sticky:
          cookie:
            name: APISERVERID
            secure: true
            httpOnly: true

    # ─── ML SERVICE ───────────────────────────────────────
    hermes-agent:
      loadBalancer:
        servers:
          - url: http://hermes-agent:5000
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
        passHostHeader: true

    # ─── WORKSPACE SERVICE ────────────────────────────────
    hermes-workspace:
      loadBalancer:
        servers:
          - url: http://hermes-workspace:3000
        healthCheck:
          path: /
          interval: 30s
          timeout: 5s
        sticky:
          cookie:
            name: WORKSPACEID
            secure: true
            httpOnly: true
            sameSite: Strict

    # ─── PLAYGROUND SERVICE ───────────────────────────────
    react-playground:
      loadBalancer:
        servers:
          - url: http://imperium-react-playground:3000
        healthCheck:
          path: /
          interval: 30s
          timeout: 5s

    # ─── PROMETHEUS SERVICE ───────────────────────────────
    prometheus:
      loadBalancer:
        servers:
          - url: http://imperium-prometheus:9090

    # ─── GRAFANA SERVICE ──────────────────────────────────
    grafana:
      loadBalancer:
        servers:
          - url: http://imperium-grafana:3000

    # ─── JAEGER SERVICE ───────────────────────────────────
    jaeger:
      loadBalancer:
        servers:
          - url: http://imperium-jaeger:16686

tcp:
  routers:
    # ─── WEBSOCKET SUPPORT (if needed) ────────────────────
    websocket-api:
      entryPoints:
        - websecure
      rule: HostSNI(`api.deputatai.com`)
      service: imperium-backend
      tls:
        certResolver: letsencrypt

tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      curvePreferences:
        - CurveP256
        - CurveP384
      sniStrict: true
      preferServerCipherSuites: true
