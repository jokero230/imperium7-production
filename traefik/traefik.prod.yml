version: '3.9'

services:
  traefik:
    image: traefik:v3.0
    container_name: imperium-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    networks:
      - traefik-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.prod.yml:/traefik.yml:ro
      - ./traefik/dynamic-config.yml:/dynamic-config.yml:ro
      - traefik-certs:/etc/traefik/acme

networks:
  traefik-net:
    external: true

volumes:
  traefik-certs:
